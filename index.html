  .header-label { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 2px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .header h1 { font-size: 26px; font-weight: 700; margin-top: 4px; letter-spacing: -0.02em; }
  .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* Buttons */

  .tab-group { display: flex; align-items: center; gap: 6px; background: #1e293b; border-radius: 8px; padding: 4px; }
  .tab-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; background: transparent; color: #94a3b8; transition: all 0.2s; }
  .tab-btn.active { background: #2563eb; color: white; }
  .view-group { display: flex; gap: 4px; background: #1e293b; border-radius: 6px; padding: 3px; }
  .view-btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; text-transform: capitalize; background: transparent; color: #64748b; }
  .view-btn.active { background: #334155; color: white; }

  /* Filters */
  .filters { padding: 16px 32px; background: #0f1629; border-bottom: 1px solid #1e293b; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
  .filter-label { display: block; font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; }
  .filter-input, .filter-select { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif; }
  .filter-input:focus, .filter-select:focus { border-color: #2563eb; }
  .filter-select option { background: #1e293b; color: #e2e8f0; }
  .filter-num { width: 56px; text-align: center; }
  .filter-sep { border-left: 1px solid #334155; padding-left: 20px; display: flex; gap: 16px; }
  .filter-inline { display: flex; align-items: center; gap: 6px; }
  .filter-unit { font-size: 12px; color: #64748b; }

  /* Content */
  .content { padding: 24px 32px; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 18px 20px; }
  .card-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
  .card-value { font-size: 28px; font-weight: 700; color: #f1f5f9; font-family: 'JetBrains Mono', monospace; }
  .card-sub { font-size: 12px; color: #475569; margin-top: 4px; }
  .card-budget { margin-top: 8px; }
  .card-budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .card-budget-label { font-size: 11px; color: #64748b; }

  /* Progress bar */
  .progress-wrap { position: relative; height: 6px; background: #1e293b; border-radius: 3px; width: 100%; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-marker { position: absolute; top: -3px; bottom: -3px; width: 1px; background: #475569; left: 100%; }

  /* Variance */
  .var-pos { color: #10b981; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .var-neg { color: #ef4444; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .var-sm { font-size: 11px; }
  .var-lg { font-size: 22px; }

  /* Budget banner */
  .budget-banner { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .budget-banner-title { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .budget-banner-actual { font-size: 24px; font-weight: 700; color: #f1f5f9; font-family: 'JetBrains Mono', monospace; }
  .budget-banner-of { font-size: 14px; color: #64748b; margin-left: 12px; }

  /* Info box */
  .info-box { background: #062e1e; border: 1px solid #10b98133; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; font-size: 13px; color: #6ee7b7; display: flex; align-items: center; gap: 10px; }

  /* Rep cards */
  .rep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .rep-card { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; }
  .rep-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .rep-card-name { font-size: 15px; font-weight: 600; color: #f1f5f9; text-transform: capitalize; }
  .rep-card-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #64748b; }
  .rep-card-row strong { color: #e2e8f0; }
  .rep-card-sub { font-size: 11px; color: #475569; margin-top: 6px; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 24px; }
  .stat-card h3 { margin: 0 0 4px; font-size: 15px; font-weight: 600; color: #94a3b8; }
  .stat-card p { margin: 0 0 16px; font-size: 12px; color: #475569; }
  .stat-num { font-size: 36px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-sub { font-size: 12px; color: #64748b; }

  /* Chart box */
  .chart-box { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
  .chart-box h3 { margin: 0 0 16px; font-size: 15px; font-weight: 600; color: #94a3b8; }
  .chart-box h3.green { color: #10b981; }
  .chart-legend { display: flex; gap: 12px; margin-bottom: 10px; padding-left: 8px; }
  .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; }
  .chart-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
  .chart-area { display: flex; align-items: flex-end; gap: 4px; padding: 0 8px; overflow-x: auto; }
  .chart-col { display: flex; flex-direction: column; align-items: center; flex: none; }
  .chart-val { font-size: 10px; color: #cbd5e1; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
  .chart-bar { border-radius: 3px 3px 0 0; transition: height 0.3s ease; }
  .chart-label { font-size: 9px; color: #64748b; margin-top: 6px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .chart-pct { font-size: 9px; margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .dual-bars { display: flex; gap: 2px; align-items: flex-end; }
  .dual-budget-bar { border-radius: 3px 3px 0 0; background: transparent; border: 1px dashed #64748b; border-bottom: none; }

  /* Table */
  .table-wrap { background: #111827; border: 1px solid #1e293b; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  .table-wrap h3 { font-size: 15px; font-weight: 600; color: #94a3b8; margin-bottom: 12px; }
  .table-wrap h3.green { color: #10b981; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; color: #94a3b8; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; font-family: 'JetBrains Mono', monospace; border-bottom: 2px solid #334155; }
  th.right { text-align: right; }
  th.center { text-align: center; }
  td { padding: 10px 12px; color: #cbd5e1; font-size: 13px; border-bottom: 1px solid #1e293b; }
  td.right { text-align: right; }
  td.center { text-align: center; }

  tr.expanded { background: #1e293b; }

  .modal-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #1e293b22; }

  .modal-input-wrap { position: relative; flex: 1; }
  .modal-dollar { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 13px; pointer-events: none; }
  .modal-input { width: 100%; padding-left: 22px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .hidden { display: none !important; }

</div>

<!-- Content -->

  activeTab: 'overview',

// ============= HELPERS =============
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getMonths(from, to) {
  const ms = [], c = new Date(from.getFullYear(), from.getMonth(), 1), e = new Date(to.getFullYear(), to.getMonth(), 1);
  while (c <= e) { ms.push(`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,'0')}`); c.setMonth(c.getMonth()+1); }
  return ms;
}

function fmtCur(v) {
  if (v === 0) return '$0';
  if (Math.abs(v) >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
  if (Math.abs(v) >= 1e3) return `$${(v/1e3).toFixed(1)}K`;
  return `$${v.toFixed(0)}`;
}

function fmtMonth(k) { const [y,m] = k.split('-'); return `${MONTH_NAMES[+m-1]} ${y}`; }
function fmtMonthShort(k) { const [y,m] = k.split('-'); return `${MONTH_NAMES[+m-1]} '${y.slice(2)}`; }

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-NZ', { month:'short', year:'numeric' });
}

function varianceHtml(actual, budget, size='') {
  if (!budget) return `<span style="color:#475569;font-size:${size==='sm'?10:12}px">No budget</span>`;
  const pct = ((actual-budget)/budget)*100;
  const cls = pct >= 0 ? 'var-pos' : 'var-neg';
  const sz = size === 'lg' ? 'var-lg' : size === 'sm' ? 'var-sm' : '';
  return `<span class="${cls} ${sz}">${pct>=0?'+':''}${pct.toFixed(1)}%</span>`;
}

function progressHtml(actual, budget) {
  if (!budget) return '';
  const pct = Math.min((actual/budget)*100, 150);
  const color = actual >= budget ? '#10b981' : pct > 75 ? '#f59e0b' : '#ef4444';
  return `<div class="progress-wrap"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div><div class="progress-marker"></div></div>`;
}

function classify(a) {
  const nbm = +document.getElementById('newBizMonths').value || 6;
  const wbm = +document.getElementById('winbackMonths').value || 12;
  const ft = new Date(a.firstTradeDate);
  const months = (NOW.getFullYear()-ft.getFullYear())*12 + (NOW.getMonth()-ft.getMonth());
  if (a.isWinback) {
    const pe = new Date(a.previousTradeEnd);
    const gap = (ft.getFullYear()-pe.getFullYear())*12 + (ft.getMonth()-pe.getMonth());
    if (gap >= wbm && months <= nbm) return 'new';
  }
  return months <= nbm ? 'new' : 'existing';
}

function getFilters() {
  return {
    rep: document.getElementById('repSelect').value,
    from: new Date(document.getElementById('dateFrom').value),
    to: new Date(document.getElementById('dateTo').value),
    nbm: +document.getElementById('newBizMonths').value || 6,
    wbm: +document.getElementById('winbackMonths').value || 12,
  };
}

function computeAccounts() {
  const f = getFilters();
  const months = getMonths(f.from, f.to);
  return ACCOUNTS.filter(a => f.rep === 'all' || a.rep === f.rep).map(a => {
    const cls = classify(a);
    let total = 0; const mb = {};
    months.forEach(m => { const v = TURNOVER[a.id]?.[m]?.total || 0; total += v; mb[m] = v; });
    const days = (f.to - f.from) / 86400000;
    const priorFrom = new Date(f.from.getTime() - days*86400000);
    const priorMonths = getMonths(priorFrom, new Date(f.from.getTime() - 86400000));
    let pt = 0; priorMonths.forEach(m => { pt += TURNOVER[a.id]?.[m]?.total || 0; });
    const growth = pt > 0 ? ((total-pt)/pt)*100 : null;
    return { ...a, classification: cls, total, mb, growth, months };
  });
}

function getBudgetRange(rep, type, months) {
  let t = 0;
  const reps = rep === 'all' ? ['deane','cory'] : [rep];
  reps.forEach(r => months.forEach(m => { t += BUDGETS[r]?.[type]?.[m] || 0; }));
  return t;
}

function sortAccounts(list) {
  return [...list].sort((a,b) => {
    let av, bv;
    if (state.sortCol === 'name') { av = a.name; bv = b.name; }
    else if (state.sortCol === 'sector') { av = a.sector; bv = b.sector; }
    else if (state.sortCol === 'growth') { av = a.growth||0; bv = b.growth||0; }
    else { av = a.total; bv = b.total; }
    if (typeof av === 'string') return state.sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return state.sortDir === 'asc' ? av-bv : bv-av;
  });
}

function handleSort(col) {
  if (state.sortCol === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  else { state.sortCol = col; state.sortDir = 'desc'; }
  render();
}

function toggleExpand(id) {
  state.expandedId = state.expandedId === id ? null : id;
  render();
}

// ============= CHART BUILDERS =============
function buildBarChart(data, height, color) {
  if (!data.length) return '<div style="padding:20px;color:#94a3b8;text-align:center">No data</div>';
  const max = Math.max(...data.map(d => d.value), 1);
  const bw = Math.max(Math.min(40, 600/data.length - 8), 12);
  const vert = data.length > 12;
  let h = `<div class="chart-area" style="height:${height}px">`;
  data.forEach(d => {
    const bh = Math.max((d.value/max)*(height-50), 2);
    const bg = d.isNew ? '#10b981' : (color||'#2563eb');
    h += `<div class="chart-col"><span class="chart-val">${fmtCur(d.value)}</span>`;
    h += `<div class="chart-bar" style="width:${bw}px;height:${bh}px;background:${bg};opacity:0.85"></div>`;
    h += `<span class="chart-label" style="${vert?'writing-mode:vertical-rl;text-orientation:mixed':''}">${d.label}</span></div>`;
  });
  return h + '</div>';
}

function buildDualChart(data, height) {
  if (!data.length) return '<div style="padding:20px;color:#94a3b8;text-align:center">No data</div>';
  const max = Math.max(...data.flatMap(d => [d.actual, d.budget||0]), 1);
  const gw = Math.max(Math.min(70, 600/data.length - 6), 28);
  const bw = Math.floor((gw-4)/2);
  const vert = data.length > 10;
  let h = '<div class="chart-legend">';
  h += '<div class="chart-legend-item"><div class="chart-legend-swatch" style="background:#2563eb"></div>Actual</div>';
  h += '<div class="chart-legend-item"><div class="chart-legend-swatch" style="background:#475569;border:1px dashed #64748b"></div>Budget</div></div>';
  h += `<div class="chart-area" style="height:${height}px">`;
  data.forEach(d => {
    const pct = d.budget > 0 ? ((d.actual-d.budget)/d.budget)*100 : null;
    const abh = Math.max((d.actual/max)*(height-60), 2);
    const bbh = d.budget > 0 ? Math.max((d.budget/max)*(height-60), 2) : 0;
    const acol = d.isNew ? '#10b981' : '#2563eb';
    h += `<div class="chart-col" style="width:${gw}px">`;
    if (pct !== null) h += `<span class="chart-pct ${pct>=0?'var-pos':'var-neg'}">${pct>=0?'+':''}${pct.toFixed(0)}%</span>`;
    h += `<span class="chart-val" style="font-size:9px">${fmtCur(d.actual)}</span>`;
    h += `<div class="dual-bars"><div class="chart-bar" style="width:${bw}px;height:${abh}px;background:${acol};opacity:0.9"></div>`;
    h += `<div class="dual-budget-bar" style="width:${bw}px;height:${bbh}px"></div></div>`;
    h += `<span class="chart-label" style="${vert?'writing-mode:vertical-rl;text-orientation:mixed':''}">${d.label}</span></div>`;
  });
  return h + '</div>';
}

// ============= TABLE BUILDER =============
function buildTable(accounts, showGrowth) {
  const si = (col) => `<span class="sort-icon ${state.sortCol===col?'active':''}">${state.sortCol===col&&state.sortDir==='asc'?'▲':'▼'}</span>`;
  let h = '<div style="overflow-x:auto"><table><thead><tr>';
  h += `<th onclick="handleSort('name')">Account ${si('name')}</th>`;
  h += `<th class="center">Rep</th>`;
  h += `<th onclick="handleSort('sector')">Sector ${si('sector')}</th>`;
  h += `<th class="center">Trading Since</th>`;
  h += `<th class="right" onclick="handleSort('total')">Turnover ${si('total')}</th>`;
  if (showGrowth) h += `<th class="right" onclick="handleSort('growth')">Period Growth ${si('growth')}</th>`;
  h += `<th style="width:30px"></th></tr></thead><tbody>`;

  sortAccounts(accounts).forEach(a => {
    const exp = state.expandedId === a.id;
    h += `<tr class="clickable ${exp?'expanded':''}" onclick="toggleExpand(${a.id})">`;
    h += `<td>${a.isWinback?'<span class="winback-badge">WINBACK</span>':''}<span class="acct-name">${a.name}</span></td>`;
    h += `<td class="center" style="text-transform:capitalize">${a.rep}</td>`;
    h += `<td>${a.sector}</td>`;
    h += `<td class="center mono" style="font-size:12px">${fmtDate(a.firstTradeDate)}</td>`;
    h += `<td class="right mono" style="font-weight:600;color:#e2e8f0">${fmtCur(a.total)}</td>`;
    if (showGrowth) {
      const gc = a.growth > 0 ? '#10b981' : a.growth < 0 ? '#ef4444' : '#94a3b8';
      h += `<td class="right mono" style="font-weight:600;color:${gc}">${a.growth!==null?(a.growth>0?'+':'')+a.growth.toFixed(1)+'%':'—'}</td>`;
    }
    h += `<td class="center" style="font-size:10px">${exp?'▲':'▼'}</td></tr>`;
    if (exp) {
      const cols = showGrowth ? 7 : 6;
      const color = a.classification === 'new' ? '#10b981' : '#2563eb';
      const chartData = a.months.map(m => ({ label: fmtMonth(m), value: a.mb[m]||0, isNew: a.classification==='new' }));
      h += `<tr><td colspan="${cols}" class="expand-detail"><div class="expand-label">Monthly Breakdown — ${a.name}</div>${buildBarChart(chartData, 140, color)}</td></tr>`;
    }
  });

  const total = accounts.reduce((s,a) => s+a.total, 0);
  const cols = showGrowth ? 4 : 3;
  h += `</tbody><tfoot><tr><td colspan="${cols}" style="font-weight:700;color:#f1f5f9">TOTAL</td>`;
  h += `<td class="right mono" style="font-size:14px">${fmtCur(total)}</td>`;
  if (showGrowth) h += '<td></td>';
  h += '<td></td></tr></tfoot></table></div>';
  return h;
}

// ============= CARD BUILDER =============
function buildCard(label, actual, budget, color, count, isPercent) {
  let h = `<div class="card" style="border-top:3px solid ${color}">`;
  h += `<div class="card-label">${label}</div>`;
  h += `<div class="card-value">${isPercent ? actual.toFixed(1)+'%' : fmtCur(actual)}</div>`;
  if (budget > 0 && !isPercent) {
    h += `<div class="card-budget"><div class="card-budget-row"><span class="card-budget-label">Budget: ${fmtCur(budget)}</span>${varianceHtml(actual,budget,'sm')}</div>${progressHtml(actual,budget)}</div>`;
  }
  if (count !== undefined && !isPercent) h += `<div class="card-sub">${count} accounts</div>`;
  h += '</div>';
  return h;
}

function buildRepCards(accounts, type, selectedRep) {
  if (selectedRep !== 'all') return '';
  const f = getFilters();
  const months = getMonths(f.from, f.to);
  let h = '<div class="rep-grid">';
  ['deane','cory'].forEach(rep => {
    const ra = accounts.filter(a => a.rep === rep);
    const actual = ra.reduce((s,a) => s+a.total, 0);
    const budget = getBudgetRange(rep, type, months);
    h += `<div class="rep-card"><div class="rep-card-head"><span class="rep-card-name">${rep}</span>${varianceHtml(actual,budget)}</div>`;
    h += `<div class="rep-card-row"><span>Actual: <strong>${fmtCur(actual)}</strong></span><span>Budget: <strong>${fmtCur(budget)}</strong></span></div>`;
    h += `${progressHtml(actual,budget)}<div class="rep-card-sub">${ra.length} accounts</div></div>`;
  });
  return h + '</div>';
}

// ============= BUDGET BANNER =============
function buildBudgetBanner(label, actual, budget) {
  let h = `<div class="budget-banner"><div><div class="budget-banner-title">${label}</div>`;
  h += `<div><span class="budget-banner-actual">${fmtCur(actual)}</span><span class="budget-banner-of">of ${fmtCur(budget)} budget</span></div></div>`;
  h += `<div style="text-align:right"><div class="budget-banner-title">Variance</div>${varianceHtml(actual,budget,'lg')}</div>`;
  h += `<div style="width:100%">${progressHtml(actual,budget)}</div></div>`;
  return h;
}

// ============= MAIN RENDER =============
function render() {
  const f = getFilters();
  const months = getMonths(f.from, f.to);
  const all = computeAccounts();
  const existing = all.filter(a => a.classification === 'existing');
  const newBiz = all.filter(a => a.classification === 'new');
  const totalRev = all.reduce((s,a) => s+a.total, 0);
  const existRev = existing.reduce((s,a) => s+a.total, 0);
  const newRev = newBiz.reduce((s,a) => s+a.total, 0);
  const growthBudget = getBudgetRange(f.rep, 'growth', months);
  const nbBudget = getBudgetRange(f.rep, 'newBiz', months);
  const totalBudget = growthBudget + nbBudget;

  let html = '<div class="cards">';
  html += buildCard('Total Turnover', totalRev, totalBudget, '#2563eb', all.length);
  html += buildCard('Existing Accounts', existRev, growthBudget, '#3b82f6', existing.length);
  html += buildCard('New Business', newRev, nbBudget, '#10b981', newBiz.length);
  html += buildCard('New Biz % of Total', totalRev > 0 ? (newRev/totalRev*100) : 0, 0, '#8b5cf6', undefined, true);
  html += '</div>';

  function getChartData(accounts) {
    if (state.viewMode === 'month') return months.map(m => ({ label: fmtMonth(m), value: accounts.reduce((s,a) => s+(a.mb[m]||0), 0) }));
    if (state.viewMode === 'week') {
      const d = [];
      months.forEach(m => { for (let w=0;w<4;w++) d.push({ label:`${fmtMonth(m)} W${w+1}`, value: accounts.reduce((s,a) => s+(TURNOVER[a.id]?.[m]?.weeks?.[w]||0), 0) }); });
      return d;
    }
    const ym = {};
    months.forEach(m => { const y=m.split('-')[0]; ym[y]=(ym[y]||0)+accounts.reduce((s,a)=>s+(a.mb[m]||0),0); });
    return Object.entries(ym).map(([y,v])=>({label:y,value:v}));
  }

  function getDualData(accounts, type) {
    return months.map(m => {
      const actual = accounts.reduce((s,a)=>s+(a.mb[m]||0),0);
      let budget = 0;
      (f.rep==='all'?REPS.filter(r=>r.id!=='all').map(r=>r.id):[f.rep]).forEach(r=>{budget+=BUDGETS[r]?.[type]?.[m]||0;});
      return { label: fmtMonth(m), actual, budget, isNew: type==='newBiz' };
    });
  }

  const vm = state.viewMode === 'week' ? 'Weekly' : state.viewMode === 'month' ? 'Monthly' : 'Yearly';

  if (state.activeTab === 'overview') {
    html += `<div class="chart-box"><h3>Total Revenue — ${vm}</h3>${buildBarChart(getChartData(all), 200)}</div>`;
    html += `<h3 style="font-size:15px;font-weight:600;color:#94a3b8;margin-bottom:12px">All Accounts</h3>`;
    html += `<div class="table-wrap">${buildTable(all, true)}</div>`;
  }

  if (state.activeTab === 'new_business') {
    const nbm = f.nbm, wbm = f.wbm;
    html += `<div class="info-box"><span style="font-size:16px">ℹ</span><span>New business = accounts trading for ${nbm} months or fewer, or winback accounts with a gap of ${wbm}+ months. Currently showing <strong>${newBiz.length} accounts</strong>.</span></div>`;
    html += buildBudgetBanner('New Business vs Budget', newRev, nbBudget);
    html += buildRepCards(newBiz, 'newBiz', f.rep);
    html += `<div class="chart-box"><h3 class="green">New Business — Actual vs Budget (Monthly)</h3>${buildDualChart(getDualData(newBiz,'newBiz'), 220)}</div>`;
    html += `<h3 style="font-size:15px;font-weight:600;color:#10b981;margin-bottom:12px">New Business Accounts</h3>`;
    html += `<div class="table-wrap">${buildTable(newBiz, false)}</div>`;
  }

  if (state.activeTab === 'account_growth') {
    html += buildBudgetBanner('Account Growth vs Budget', existRev, growthBudget);
    const growing = existing.filter(a => a.growth > 0).length;
    const declining = existing.filter(a => a.growth !== null && a.growth < 0).length;
    html += `<div class="stat-grid">`;
    html += `<div class="stat-card"><h3>Growing Accounts</h3><p>vs. equivalent prior period</p><div class="stat-num" style="color:#10b981">${growing}</div><div class="stat-sub">of ${existing.length} existing accounts</div></div>`;
    html += `<div class="stat-card"><h3>Declining Accounts</h3><p>vs. equivalent prior period</p><div class="stat-num" style="color:#ef4444">${declining}</div><div class="stat-sub">of ${existing.length} existing accounts</div></div>`;
    html += `</div>`;
    html += `<div class="chart-box"><h3>Account Growth — Actual vs Budget (Monthly)</h3>${buildDualChart(getDualData(existing,'growth'), 220)}</div>`;
    html += buildRepCards(existing, 'growth', f.rep);
    html += `<h3 style="font-size:15px;font-weight:600;color:#94a3b8;margin-bottom:12px">Existing Account Performance</h3>`;
    html += `<div class="table-wrap">${buildTable(existing, true)}</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ============= TABS & CONTROLS =============
function initControls() {
  // Rep select
  const sel = document.getElementById('repSelect');
  REPS.forEach(r => {
    sel.innerHTML += `<option value="${r.id}">${r.name}</option>`;
  });

  // Main tabs
  const tabC = document.getElementById('mainTabs');
  [['overview','Overview'],['new_business','New Business'],['account_growth','Account Growth']].forEach(([id,label]) => {
    const b = document.createElement('button');
    b.className = `tab-btn ${state.activeTab===id?'active':''}`;
    b.textContent = label;
    b.onclick = () => { state.activeTab = id; state.expandedId = null; updateTabStyles(); render(); };
    tabC.appendChild(b);
  });

  // View buttons
  const vc = document.getElementById('viewBtns');
  ['week','month','year'].forEach(v => {
    const b = document.createElement('button');
    b.className = `view-btn ${state.viewMode===v?'active':''}`;
    b.textContent = v + 'ly';
    b.onclick = () => { state.viewMode = v; updateViewStyles(); render(); };
    vc.appendChild(b);
  });
}

function updateTabStyles() {
  document.querySelectorAll('#mainTabs .tab-btn').forEach((b,i) => {
    const ids = ['overview','new_business','account_growth'];
    b.className = `tab-btn ${state.activeTab===ids[i]?'active':''}`;
  });
}

function updateViewStyles() {
  document.querySelectorAll('#viewBtns .view-btn').forEach((b,i) => {
    const vs = ['week','month','year'];
    b.className = `view-btn ${state.viewMode===vs[i]?'active':''}`;
  });
}

// ============= BUDGET MODAL =============
function toggleBudgetModal() {
  const m = document.getElementById('budgetModal');
  m.classList.toggle('hidden');
  if (!m.classList.contains('hidden')) renderBudgetModal();
}

function closeBudgetModal(e) {
  if (e.target === document.getElementById('budgetModal')) toggleBudgetModal();
}

function renderBudgetModal() {
  // Rep tabs
  const rt = document.getElementById('modalRepTabs');
  rt.innerHTML = '';
  REPS.filter(r=>r.id!=='all').map(r=>r.id).forEach(r => {
    const b = document.createElement('button');
    b.className = `modal-tab-btn ${state.budgetEditRep===r?'active-blue':''}`;
    b.textContent = r;
    b.onclick = () => { state.budgetEditRep = r; renderBudgetModal(); };
    rt.appendChild(b);
  });

  // Type tabs
  const tt = document.getElementById('modalTypeTabs');
  tt.innerHTML = '';
  [['growth','Account Growth'],['newBiz','New Business']].forEach(([id,label]) => {
    const b = document.createElement('button');
    b.className = `modal-tab-btn ${state.budgetEditType===id?(id==='newBiz'?'active-green':'active-blue'):''}`;
    b.textContent = label;
    b.onclick = () => { state.budgetEditType = id; renderBudgetModal(); };
    tt.appendChild(b);
  });

  // Grid
  const allMonths = getMonths(new Date(2024,7,1), new Date(2026,1,1));
  const cur = BUDGETS[state.budgetEditRep]?.[state.budgetEditType] || {};
  const grid = document.getElementById('modalGrid');
  grid.innerHTML = '';
  allMonths.forEach(m => {
    const row = document.createElement('div');
    row.className = 'modal-row';
    row.innerHTML = `<span class="modal-month">${fmtMonthShort(m)}</span>
      <div class="modal-input-wrap"><span class="modal-dollar">$</span>
      <input type="number" step="1000" min="0" value="${cur[m]||0}" class="filter-input modal-input"
        onchange="updateBudgetVal('${state.budgetEditRep}','${state.budgetEditType}','${m}',this.value)">
      </div>`;
    grid.appendChild(row);
  });
}

function updateBudgetVal(rep, type, month, val) {
  BUDGETS[rep][type][month] = parseInt(val) || 0;
  render();
}

// ============= INIT =============
initControls();
render();
</script>
