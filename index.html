var fmt = function(v){return '$'+parseFloat(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');};

// Populate rep filter
var sel = document.getElementById('selRep');
DATA.forEach(function(r){
  var o = document.createElement('option'); o.value = r.staffId; o.textContent = r.staffName; sel.appendChild(o);
});

function render(){
  var repFilter  = document.getElementById('selRep').value;
  var typeFilter = document.getElementById('selType').value;
  var filtered = DATA.filter(function(r){ return !repFilter || String(r.staffId)===repFilter; });

  var totAcc=0, totSpend=0, totNB=0;
  var html = '';
  filtered.forEach(function(rep){
    var accounts = rep.accounts.filter(function(a){
      if(typeFilter==='new') return a.isNewBusiness;
      if(typeFilter==='existing') return !a.isNewBusiness;
      return true;
    });
    if(!accounts.length) return;
    totAcc += accounts.length;
    var spend = accounts.reduce(function(s,a){return s+a.monthlySpend;},0);
    var nb    = accounts.filter(function(a){return a.isNewBusiness;}).reduce(function(s,a){return s+a.monthlySpend;},0);
    totSpend += spend; totNB += nb;
    var nbPct = spend>0?(nb/spend*100).toFixed(1):'0.0';
    html += '<div class="rep"><div class="rep-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">';
    html += '<h4><i class="fas fa-user" style="margin-right:8px"></i>'+rep.staffName+'</h4>';
    html += '<div class="rep-meta"><span>'+accounts.length+' accounts</span><span>Total: <b>'+fmt(spend)+'</b></span><span>New Biz: <b>'+fmt(nb)+'</b> ('+nbPct+'%)</span><span style="opacity:.4"><i class="fas fa-chevron-down"></i></span></div></div>';
    html += '<div><table><thead><tr><th>Account</th><th>Date Joined</th><th>Months Active</th><th>Type</th><th style="text-align:right">Monthly Spend</th></tr></thead><tbody>';
    accounts.forEach(function(a){
      html += '<tr><td>'+a.clientName+'</td><td>'+(a.dateJoined||'—')+'</td><td>'+a.monthsActive+'</td>';
      html += '<td>'+(a.isNewBusiness?'<span class="nb">New Business</span>':'<span class="ex">Existing</span>')+'</td>';
      html += '<td class="amt">'+fmt(a.monthlySpend)+'</td></tr>';
    });
    html += '</tbody></table></div></div>';
  });

  document.getElementById('out').innerHTML = html || '<div class="alert alert-info">No data for selected filters.</div>';
  document.getElementById('sReps').textContent    = filtered.length;
  document.getElementById('sAccounts').textContent = totAcc;
  document.getElementById('sTotal').textContent   = fmt(totSpend);
  document.getElementById('sNB').textContent      = fmt(totNB);
}

function exportCSV(){
  var repFilter  = document.getElementById('selRep').value;
  var typeFilter = document.getElementById('selType').value;
  var rows = [['Rep','Account','Date Joined','Months Active','Type','Monthly Spend']];
  DATA.forEach(function(rep){
    if(repFilter && String(rep.staffId)!==repFilter) return;
    rep.accounts.forEach(function(a){
      if(typeFilter==='new' && !a.isNewBusiness) return;
      if(typeFilter==='existing' && a.isNewBusiness) return;
      rows.push([rep.staffName,a.clientName,a.dateJoined||'',a.monthsActive,a.isNewBusiness?'New Business':'Existing',a.monthlySpend.toFixed(2)]);
    });
  });
  var csv = rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
  var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'sales-2025-10.csv'; a.click();
}

render();
